# mkdocs.yml

site_name: Phytospatial
site_description: The open-source standard for enhanced forest inventories
site_url: https://phytospatial.readthedocs.io/
repo_url: https://github.com/Louis-Gm/phytospatial
repo_name: Louis-Gm/phytospatial

theme:
  name: material
  logo: assets/images/logo/logo-transparent-small.png
  favicon: assets/images/logo/logo-black-small.png
  custom_dir: docs/overrides

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - content.code.copy
    - navigation.expand
    - navigation.top

  font:
    text: Ovo
    code: Roboto Mono

  palette:
      scheme: slate

extra_css:
  - stylesheets/theme.css
  - stylesheets/home.css
  - stylesheets/global.css

markdown_extensions:
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

plugins:
  - search
  - mkdocs-jupyter
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
  - include-markdown

# NOTE: DO NOT REMOVE THE COMMENTS AROUND THE API REFERENCE SECTION. 
